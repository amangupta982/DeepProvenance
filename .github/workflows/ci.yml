name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint frontend (ESLint)
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Install backend deps
        run: cd backend && pip install -r requirements-ci.txt

      - name: Lint backend (Ruff)
        run: cd backend && ruff check .

      - name: Type check backend (mypy)
        run: cd backend && mypy app/ --ignore-missing-imports

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements-ci.txt

      - name: Run tests
        env:
          DEMO_MODE: "true"
        run: cd backend && pytest tests/ -v --tb=short

  test-contracts:
    runs-on: ubuntu-latest
    env:
      HARDHAT_DISABLE_TELEMETRY_PROMPT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: cd contracts && npm ci

      - name: Compile contracts
        run: cd contracts && npx hardhat compile

      - name: Run tests
        run: cd contracts && npx hardhat test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
