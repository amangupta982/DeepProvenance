name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint frontend (ESLint)
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Install backend deps
        run: cd backend && pip install -r requirements.txt

      - name: Lint backend (Ruff)
        run: cd backend && ruff check .

      - name: Type check backend (mypy)
        run: cd backend && mypy app/ --ignore-missing-imports

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: deepprov
          POSTGRES_PASSWORD: deepprov
          POSTGRES_DB: deepprovenance_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://deepprov:deepprov@localhost:5432/deepprovenance_test
          REDIS_URL: redis://localhost:6379/0
          DEMO_MODE: "true"
        run: cd backend && pytest tests/ -v --tb=short

  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd contracts && npm ci

      - name: Compile contracts
        run: cd contracts && npx hardhat compile

      - name: Run tests
        run: cd contracts && npx hardhat test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
